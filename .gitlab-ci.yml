stages:
  - test

test:
  stage: test
  image: python:3.11
  cache:
    key: "$CI_JOB_NAME"
    paths:
      - .cache/pip
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  before_script:
    - python --version
    - python -m pip install --upgrade pip
    - pip install -e '.[dev]'
  script:
    - pytest
